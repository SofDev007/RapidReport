<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — RapidReport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar scrolled" id="navbar">
  <a href="/" class="logo">
    <span class="logo-icon">⊕</span>
    <span class="logo-text">RAPID<strong>REPORT</strong></span>
  </a>
  <div class="nav-auth">
    <a href="/login-page" class="btn-ghost">Login</a>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <div class="section-label">Join Us</div>
    <h1>Create Account</h1>
    <p class="form-sub">Sign up to track your reports and stay updated on case progress.</p>

    <div id="alert" class="form-alert"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password">
    </div>

    <button class="btn-primary form-submit" id="signup-btn" onclick="handleSignup()">
      Create Account →
    </button>

    <div class="form-link">Already have an account? <a href="/login-page">Login</a></div>
    <div class="form-link" style="margin-top:0.5rem"><a href="/">← Back to Home</a></div>
  </div>
</div>

<script>
async function handleSignup() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('signup-btn');

  if (!name || !email || !password) {
    showAlert('alert', 'Please fill in all fields.', 'error'); return;
  }
  if (password.length < 6) {
    showAlert('alert', 'Password must be at least 6 characters.', 'error'); return;
  }

  btn.textContent = 'Creating account...'; btn.disabled = true;

  try {
    const res  = await fetch('/api/signup', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();

    if (res.ok) {
      showAlert('alert', 'Account created! Redirecting to login...', 'success');
      setTimeout(() => window.location.href = '/login-page', 1200);
    } else {
      showAlert('alert', data.error || 'Signup failed.', 'error');
      btn.textContent = 'Create Account →'; btn.disabled = false;
    }
  } catch {
    showAlert('alert', 'Network error. Please try again.', 'error');
    btn.textContent = 'Create Account →'; btn.disabled = false;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = `form-alert ${type} show`;
}
</script>
</body>
</html>
